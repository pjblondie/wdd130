<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/index.css">
    <script src="js/index.js" defer></script>
</head>
<body>
    <header></header>
    <main>
        <div id="cardOne">
            <div id="total">
                <h1>TOTAL: $199</h1>
            </div>
            <h3 id="cardIcon">💳</h3>
            <div id="cardNum">
                <h2>CARD NUMBER</h2>
                <input type="text"  id="inputCardNum" name="cardNumber" placeholder="1234 5678 9101 1020"  aria-labelledby="cardNum">
            </div>
            <div id="cardHold">
                <h2>CARD HOLDER</h2>
                <input type="text" id="inputCardHold" name="cardHolder" placeholder="John Doe" aria-labelledby="cardHold">
            </div>
            <div id="cardExp">
                <h2>EXPIRATION</h2>
                <input type='text' id='month' name="expMonth" placeholder="MM" aria-labelledby="cardExp">
                <input type='text' id='year' name="expYear" placeholder="YY" aria-labelledby="cardExp">
            </div>
        </div>
        <div id="cardTwo">
            <hr id="cardSwipe">
            <div id="securityNum">
                <h2>CVC/CVV</h2>
                <input type="text" id="cvv" name="cvv" placeholder="xxx" aria-labelledby="securityNum">
            </div>
        </div>
        <button id="submitButton">Submit</button>
    </main>
</body>
</html>
