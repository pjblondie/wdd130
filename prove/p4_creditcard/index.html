<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <header></header>
    <main>
        <div id="cardOne">
            <div id="total">
                <h1>Total: $199</h1>
            </div>
            <h1>💳</h1>
            <div>
                <h2>CARD NUMBER</h2>
                <input type="text" id="cardNum" name="cardNumber" placeholder="1234 5678 9101 1020">
            </div>
            <div>
                <h2>CARD HOLDER</h2>
                <input type="text" id="cardHold" name="cardHolder" placeholder="John Doe">
            </div>
            <div>
                <h2>EXPIRATION</h2>
                <input type='text' id='month' name="expMonth" placeholder="MM" aria-labelledby="expirationDate">
                <input type='text' id='year' name="expYear" placeholder="YY" aria-labelledby="expirationDate">
            </div>
        </div>
        <div id="cardTwo">
            <hr id="cardSwipe">
            <div>
                <h2>CVC/CVV</h2>
                <input type="text" id="cvv" name="cvv" placeholder="xxx">
            </div>
        </div>
        <button>Submit</button>
    </main>
</body>
</html>
