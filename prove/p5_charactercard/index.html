<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/index.css">
    <script src="js/index.js" defer></script>
</head>
<body>
    <section class="card"> 
       
        <img class="image" src="img/assult_int_aurilean-1.jpg">
        <div class="name">
            <h2 id="characterName">Aurelian</h2>
        </div>
        <div class="stats">
            <h2>Faction:</h2>
            <p class="stats p">Space Marine</p>
            <h2>Rank:</h2>
            <p class="stats p" id="rank">Sergant</p>
            <h2>Wounds:</h2>
            <p class="stats p" id="wounds">6</p>
        </div>
        <div class="buttons">
            <button id="attack">Attacked</button>
            <button id="rankUp">Rank Up</button>
        </div>
    </section>
</body>
</html>
