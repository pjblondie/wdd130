<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/index.js" defer></script>
                
</head>
<body>
    <header>
       <div id="recipeBook">
        <img src="images/recipe-book.png" width="150" alt="recipe book">
        <h1>RECIPEBOOK</h1>
    </div> 
    </header>
    <main>
        <div id="searchBar"> 
            <input type="text"  id="findRecipe" name="findRecipe" placeholder="Find a recipe"  aria-labelledby="findRecipe">
            <hr id="searchDivider">
            <img id="spyglass"src="images/search.svg" width="75" alt="search lens">
        </div>
        <hr id="separator">
    <div class="recipe">
        <div id="appleCrisp">
            <img src="images/apple-crisp.jpg" id="img_apple" alt="apple-crisp photo">
            <div class="recipeDetails">
                <button class="recipeType">dessert</button>
                <h2 class="recipeTitle">APPLE CRISP</h2>
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="recipeDescription">This appple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
            </div>
        </div>
    </div>
                
    </main>
    <footer>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon" width="50"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon" width="50"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon" width="50"></a>
          </div>                  
                          
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
                
    </footer>
</body>
</html>
